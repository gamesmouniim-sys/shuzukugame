name: shizuku_game_booster
description: A premium Shizuku-powered game booster simulation app with glassmorphism UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  fl_chart: ^0.66.2
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  share_plus: ^10.0.2
  in_app_review: ^2.0.9
  http: ^1.2.2
  applovin_max: ^4.6.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/shi_icon.png
    - assets/config/shizuku.json
